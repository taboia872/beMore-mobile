# Project-wide Gradle settings.

# Specifies the JVM arguments used for the daemon process.
# FIX: Force JDK internal SAX parser to avoid Xerces SAXNotRecognizedException
# when resolving Maven metadata (accessExternalSchema property).
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Djavax.xml.parsers.SAXParserFactory=com.sun.org.apache.xerces.internal.jaxp.SAXParserFactoryImpl -Djavax.xml.transform.TransformerFactory=com.sun.org.apache.xalan.internal.xsltc.trax.TransformerFactoryImpl

# When configured, Gradle will run in incubating parallel mode.
# org.gradle.parallel=true

# AndroidX
android.useAndroidX=true

# Architecture
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# New Architecture
newArchEnabled=true

# Hermes JS engine
hermesEnabled=true
